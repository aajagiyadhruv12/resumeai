services:
  - type: web
    name: resumeai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.11"
      - key: FLASK_DEBUG
        value: "False"
      - key: SECRET_KEY
        value: "resumeai-secret-key-12345"
      - key: FIREBASE_PROJECT_ID
        value: "resumeai-9"
      # Set these in Render Dashboard with your actual keys:
      # - GOOGLE_API_KEY
      # - OPENAI_API_KEY
      # - SAMBANOVA_API_KEY
      # - FIREBASE_PRIVATE_KEY
      # - FIREBASE_CLIENT_EMAIL
